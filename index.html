<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h2>Income Tax Calculator</h2>
        
        <div class="inputs-grid">
            <!-- Left Column: Income Details -->
            <div class="grid-column">
                <h3 class="section-heading">Income Details</h3>
                <div class="input-group">
                    <label for="gross_salary">Gross Salary (₹) <span class="asterisk">*</span></label>
                    <input type="text" id="gross_salary" inputmode="numeric" placeholder="Enter amount">
                </div>
                <div class="input-group">
                    <label for="pension">Other Income (Pension, Interest, etc.)</label>
                    <input type="text" id="pension" inputmode="numeric" placeholder="Enter amount, if any">
                </div>
            </div>
            
            <!-- Right Column: Deductions -->
            <div class="grid-column">
                <h3 class="section-heading">Deductions (Old Regime)</h3>
                <div class="input-group">
                    <label for="homeloan_int">Homeloan interest</label>
                    <input type="text" id="homeloan_int" inputmode="numeric" placeholder="Enter amount, if any">
                </div>
                <div class="input-group">
                    <label for="sec_80c">Sec 80C (PF, LIC, etc.)</label>
                    <input type="text" id="sec_80c" inputmode="numeric" placeholder="Enter amount, if any">
                </div>
                <div class="input-group">
                    <label for="nps">Other deductions (80D, 80G, NPS, etc.)</label>
                    <input type="text" id="nps" inputmode="numeric" placeholder="Enter amount, if any">
                </div>
            </div>
        </div>

        <button onclick="handleCalculate()" style="background-color: #007bff; margin-top: 20px;"><b>Calculate</b></button>

        <div id="results" style="display: none; margin-top: 25px;">
            <p style="text-align: center; margin-bottom: 20px;">You need to pay this amount as income tax under different tax regimes -</p>
            <div class="tax-results-container">
                <div class="tax-regime old-regime">
                    <h3>Old Regime</h3>
                    <p class="tax-amount" id="old_tax_result">₹0</p>
                </div>
                <div class="tax-regime new-regime">
                    <h3>New Regime</h3>
                    <p class="tax-amount" id="new_tax_result">₹0</p>
                </div>
            </div>
            <div class="disclaimer">
                *Disclaimer: This is a rough calculation. For accurate income tax amount, please consult a qualified CA / income tax website.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
